<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a0a0a">
    <title>Offline - Chukka Score</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 24rem;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        p {
            color: #a3a3a3;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        button {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 0.625rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
        }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#x1F4F6;</div>
        <h1>You're offline</h1>
        <p>
            If you were scoring a match, your events are safely queued.
            They'll sync automatically when you reconnect.
        </p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
